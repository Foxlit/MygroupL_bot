name: Парсинг ссылок на пары

on:
  schedule:
    - cron: '11 14 * * 1-5'  # 17:11 МСК
    - cron: '30 15 * * 1-5'  # 18:30 МСК
  workflow_dispatch:
    inputs:
      subject:
        description: 'Название предмета (оставьте пустым для автоопределения)'
        required: false
        default: ''

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parser/package-lock.json

      - name: Install dependencies
        working-directory: ./parser
        run: npm ci

      - name: Get today's subject
        id: subject
        run: |
          if [[ -n "${{ github.event.inputs.subject }}" ]]; then
            echo "name=${{ github.event.inputs.subject }}" >> $GITHUB_OUTPUT
            echo "manual=true" >> $GITHUB_OUTPUT
            echo "✅ Ручной режим: ${{ github.event.inputs.subject }}"
          else
            # Пытаемся найти сегодняшний предмет
            SUBJECT=$(node -e "
              const schedule = require('./parser/shedule.json');
              const today = new Date();
              const day = String(today.getDate()).padStart(2, '0');
              const month = String(today.getMonth() + 1).padStart(2, '0');
              const year = today.getFullYear();
              const todayStr = \`\${day}.\${month}.\${year}\`;
              const webinar = schedule.datesAndNames.find(item => item.date === todayStr);
              console.log(webinar ? webinar.name : '');
            ")
            echo "name=$SUBJECT" >> $GITHUB_OUTPUT
            echo "manual=false" >> $GITHUB_OUTPUT

            if [[ -n "$SUBJECT" ]]; then
              echo "✅ Автоопределение: $SUBJECT"
            else
              echo "⏭️ Сегодня пар нет по расписанию"
            fi
          fi

      - name: Check if should run
        id: check
        run: |
          if [[ -z "${{ steps.subject.outputs.name }}" ]]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Run parser
        if: steps.check.outputs.run == 'true'
        working-directory: ./parser
        env:
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: node main.js "${{ steps.subject.outputs.name }}"

      - name: Save link to database
        if: success() && steps.check.outputs.run == 'true'
        run: |
          if [ -f parser/link.txt ]; then
            LINK=$(cat parser/link.txt)
            SUBJECT="${{ steps.schedule.outputs.subject }}"

            # Создаём папку если нет
            mkdir -p shared-data

            sqlite3 shared-data/bot_data.db "CREATE TABLE IF NOT EXISTS links (id INTEGER PRIMARY KEY AUTOINCREMENT, par_name TEXT NOT NULL, link TEXT NOT NULL, parsed_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP, notified BOOLEAN DEFAULT 0);"
            sqlite3 shared-data/bot_data.db "INSERT INTO links (par_name, link) VALUES ('$SUBJECT', '$LINK');"

            echo "✅ Ссылка сохранена в БД: $SUBJECT"
            echo "🔗 $LINK"
          else
            echo "⚠️ Файл link.txt не найден"
          fi

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-data
          path: shared-data/bot_data.db
          retention-days: 7
